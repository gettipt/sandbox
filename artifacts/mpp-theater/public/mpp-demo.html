<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TIPT MPP Demo</title>
  <script>
    (() => {
      const param = new URLSearchParams(window.location.search).get("clawpilotTheme");
      const theme = param || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>
  <style>
    :root {
      color-scheme: light;
      --cp-bg: #f7f4ef;
      --cp-bg-elevated: #fcfbf8;
      --cp-surface: #ffffff;
      --cp-surface-soft: #f5f5f5;
      --cp-border: #dedede;
      --cp-border-strong: #919191;
      --cp-text: #242424;
      --cp-text-muted: #5c5c5c;
      --cp-text-soft: #6f6f6f;
      --cp-accent: #b11f4b;
      --cp-accent-hover: #9a1a41;
      --cp-accent-soft: rgba(177, 31, 75, 0.08);
      --cp-accent-fg: #ffffff;
      --cp-success: #16a34a;
      --cp-danger: #dc2626;
      --cp-warning: #f59e0b;
      --cp-link: #0078d4;
      --cp-shadow: 0 18px 48px rgba(0,0,0,0.12);
    }
    html[data-theme="dark"] {
      color-scheme: dark;
      --cp-bg: #3d3b3a;
      --cp-bg-elevated: #343231;
      --cp-surface: #292929;
      --cp-surface-soft: #2e2e2e;
      --cp-border: #474747;
      --cp-border-strong: #5f5f5f;
      --cp-text: #dedede;
      --cp-text-muted: #919191;
      --cp-text-soft: #b0b0b0;
      --cp-accent: #fd8ea1;
      --cp-accent-hover: #fb7b91;
      --cp-accent-soft: rgba(253, 142, 161, 0.14);
      --cp-accent-fg: #1a1a1a;
      --cp-success: #4ade80;
      --cp-danger: #f87171;
      --cp-warning: #fbbf24;
      --cp-link: #4da6ff;
      --cp-shadow: 0 18px 48px rgba(0,0,0,0.32);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--cp-bg);
      color: var(--cp-text);
      font-family: "Segoe UI", Aptos, Calibri, -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
      gap: 20px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .card {
      background: var(--cp-surface);
      border: 1px solid var(--cp-border);
      border-radius: 16px;
      padding: 20px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 0 2px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.14);
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--cp-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 14px;
    }

    .wallet-status {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 10px;
      background: var(--cp-surface-soft);
      border: 1px solid var(--cp-border);
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--cp-border-strong);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .status-dot.detected { background: var(--cp-success); }
    .status-dot.waiting { background: var(--cp-warning); animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-text { font-size: 13px; color: var(--cp-text-soft); }
    .status-caps { font-size: 11px; color: var(--cp-text-muted); margin-top: 2px; font-family: Consolas, "Courier New", monospace; }
    .status-wallet { font-size: 11px; margin-top: 2px; color: var(--cp-text-muted); }
    .status-wallet.configured { color: var(--cp-success); }
    .status-wallet.unconfigured { color: var(--cp-warning); }

    .form-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 10px 12px;
      margin-bottom: 14px;
    }

    label {
      font-size: 13px;
      color: var(--cp-text-muted);
      white-space: nowrap;
    }

    input {
      width: 100%;
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid var(--cp-border);
      background: var(--cp-surface-soft);
      color: var(--cp-text);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--cp-border-strong); }
    input::placeholder { color: var(--cp-text-muted); }

    button {
      width: 100%;
      padding: 9px 16px;
      border-radius: 10px;
      border: none;
      background: var(--cp-accent);
      color: var(--cp-accent-fg);
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    button:hover:not(:disabled) { background: var(--cp-accent-hover); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    .response-box {
      border-radius: 10px;
      border: 1px solid var(--cp-border);
      overflow: hidden;
    }

    .response-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--cp-surface-soft);
      border-bottom: 1px solid var(--cp-border);
      font-size: 12px;
      font-weight: 600;
      color: var(--cp-text-muted);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
    }
    .badge-success { background: var(--cp-accent-soft); color: var(--cp-success); }
    .badge-error   { background: var(--cp-accent-soft); color: var(--cp-danger); }
    .badge-waiting { background: var(--cp-accent-soft); color: var(--cp-warning); }

    pre {
      padding: 12px;
      font-size: 12px;
      font-family: Consolas, "Courier New", monospace;
      color: var(--cp-text);
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 200px;
      overflow-y: auto;
      background: var(--cp-surface);
      margin: 0;
    }

    .log {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .log-entry {
      display: flex;
      gap: 8px;
      font-size: 12px;
      font-family: Consolas, "Courier New", monospace;
      padding: 6px 12px;
      border-radius: 8px;
      background: var(--cp-surface-soft);
      border: 1px solid var(--cp-border);
    }
    .log-time { color: var(--cp-text-muted); flex-shrink: 0; }
    .log-event { color: var(--cp-accent); font-weight: 600; flex-shrink: 0; }
    .log-msg { color: var(--cp-text-soft); }

    .empty { color: var(--cp-text-muted); font-size: 13px; font-style: italic; padding: 8px 0; }

    .divider {
      height: 1px;
      background: var(--cp-border);
      margin: 14px 0;
    }

    .error-msg {
      font-size: 12px;
      color: var(--cp-danger);
      margin-top: 6px;
      min-height: 16px;
    }

    .kind-hint {
      font-size: 11px;
      color: var(--cp-text-muted);
      margin-top: 2px;
      font-family: Consolas, "Courier New", monospace;
      min-height: 16px;
    }
    .kind-hint .kind-name { color: var(--cp-text); font-weight: 600; }
    .kind-hint.bolt11 .kind-name { color: var(--cp-warning); }
    .kind-hint.spark  .kind-name { color: var(--cp-link); }
    .kind-hint.lnurl  .kind-name,
    .kind-hint.address .kind-name { color: var(--cp-success); }
    .kind-hint.invalid .kind-name { color: var(--cp-danger); }

    /* Hide the amount field row entirely when the recipient is a raw
       BOLT11 invoice — the amount is embedded and a payer-supplied value
       would be discarded by the extension anyway. */
    .form-grid.no-amount #amountLabel,
    .form-grid.no-amount #amount { display: none; }
  </style>
</head>
<body>

  <h1>TIPT MPP Demo</h1>

  <!-- Wallet Status -->
  <div class="card">
    <div class="card-title">Wallet Status</div>
    <div class="wallet-status">
      <div class="status-dot waiting" id="statusDot"></div>
      <div>
        <div class="status-text" id="statusText">Waiting for TIPT…</div>
        <div class="status-caps" id="statusCaps"></div>
        <div class="status-wallet" id="statusWallet"></div>
      </div>
    </div>
  </div>

  <!-- Payment Form -->
  <div class="card">
    <div class="card-title">Request Payment</div>
    <div class="form-grid">
      <label for="recipient">Recipient</label>
      <input
        id="recipient"
        type="text"
        placeholder="user@host.com, lnurl1…, lnbc…, or spark1…"
        autocomplete="off"
        spellcheck="false"
      />
      <label for="amount" id="amountLabel">&#8383;</label>
      <input id="amount" type="number" min="1" placeholder="Amount in sats" />
    </div>
    <div class="kind-hint" id="kindHint">Detected: —</div>
    <div class="error-msg" id="formError"></div>
    <button id="payBtn" disabled>Pay via TIPT SDK</button>
  </div>

  <!-- Response -->
  <div class="card">
    <div class="card-title">Payment Response</div>
    <div id="responseEmpty" class="empty">No payment sent yet.</div>
    <div id="responseBox" class="response-box" style="display:none">
      <div class="response-header">
        <span>mpp:credential</span>
        <span id="responseBadge" class="badge"></span>
      </div>
      <pre id="responseJson"></pre>
    </div>
  </div>

  <!-- Event Log -->
  <div class="card">
    <div class="card-title">Event Log</div>
    <div class="log" id="eventLog">
      <div class="empty" id="logEmpty">No events yet.</div>
    </div>
  </div>

  <script type="module">
    // Support both bundled/dev environments (bare import) and direct browser
    // loading of this standalone HTML file (ESM CDN fallback).
    const sdkMod = await import('lightning-mpp-extension-sdk')
      .catch(() => import('https://esm.sh/lightning-mpp-extension-sdk@0.1.1'));
    const createTiptLightningClient = sdkMod.createLightningMppExtensionClient;
    if (typeof createTiptLightningClient !== 'function') {
      throw new Error('lightning-mpp-extension-sdk does not export createLightningMppExtensionClient.');
    }

    // ── Bech32 decoder (for lnurl1… strings) ──────────────────────────────────
    const CHARSET = 'qpzry9x8gf2tvdw0s3jn54khce6mua7l';
    const GENERATOR = [0x3b6a57b2, 0x26508e6d, 0x1ea119fa, 0x3d4233dd, 0x2a1462b3];

    function polymod(values) {
      let chk = 1;
      for (const v of values) {
        const b = chk >> 25;
        chk = (chk & 0x1ffffff) << 5 ^ v;
        for (let i = 0; i < 5; i++) if ((b >> i) & 1) chk ^= GENERATOR[i];
      }
      return chk;
    }
    function hrpExpand(hrp) {
      const r = [];
      for (let i = 0; i < hrp.length; i++) r.push(hrp.charCodeAt(i) >> 5);
      r.push(0);
      for (let i = 0; i < hrp.length; i++) r.push(hrp.charCodeAt(i) & 31);
      return r;
    }
    function bech32Decode(str) {
      str = str.toLowerCase();
      const pos = str.lastIndexOf('1');
      if (pos < 1 || pos + 7 > str.length || str.length > 2000) return null;
      const hrp = str.slice(0, pos);
      const data = [];
      for (let i = pos + 1; i < str.length; i++) {
        const d = CHARSET.indexOf(str[i]);
        if (d === -1) return null;
        data.push(d);
      }
      if (polymod([...hrpExpand(hrp), ...data]) !== 1) return null;
      return data.slice(0, -6);
    }
    function fromWords(words) {
      let value = 0, bits = 0;
      const out = [];
      for (const w of words) {
        value = (value << 5) | w; bits += 5;
        while (bits >= 8) { bits -= 8; out.push((value >> bits) & 0xff); }
      }
      return out;
    }
    function decodeLnurlStr(lnurl) {
      const words = bech32Decode(lnurl);
      if (!words) return null;
      return new TextDecoder().decode(new Uint8Array(fromWords(words)));
    }

    // ── Recipient classification ──────────────────────────────────────────────
    // Mirror src/lib/payment-target.ts in the extension so the demo's UI
    // hint matches what the extension will actually do. The extension is
    // the source of truth for routing — this is purely a UX preview.
    const SPARK_PREFIXES = [
      'spark1', 'sparkt1', 'sparkrt1', 'sparks1', 'sparkl1',
      'sp1', 'spt1', 'sprt1', 'sps1', 'spl1',
    ];
    const BOLT11_PREFIX_RE = /^ln(bc|tb|tbs|bcrt)/i;
    const LIGHTNING_ADDRESS_RE = /^[a-z0-9._-]+@[a-z0-9.-]+\.[a-z]{2,}$/i;

    function classifyRecipient(raw) {
      const v = (raw || '').trim();
      if (!v) return { kind: 'empty' };
      const lower = v.toLowerCase();
      if (BOLT11_PREFIX_RE.test(lower)) return { kind: 'bolt11', value: v };
      for (const p of SPARK_PREFIXES) {
        if (lower.startsWith(p) && lower.length > p.length) return { kind: 'spark', value: v };
      }
      if (lower.startsWith('lnurl1')) return { kind: 'lnurl', value: v };
      if (LIGHTNING_ADDRESS_RE.test(v)) return { kind: 'address', value: v };
      return { kind: 'invalid', value: v };
    }

    const KIND_LABEL = {
      bolt11: 'BOLT11 invoice (Lightning, amount embedded)',
      spark: 'Spark address (requires amount)',
      lnurl: 'LNURL (will resolve to BOLT11)',
      address: 'Lightning Address (will resolve to BOLT11)',
      invalid: 'Unrecognised — try a Lightning Address, LNURL, BOLT11, or Spark address',
      empty: '—',
    };

    // ── LNURL resolution ──────────────────────────────────────────────────────
    async function resolveToUrl(input) {
      input = input.trim();
      if (input.includes('@')) {
        const [user, domain] = input.split('@');
        return `https://${domain}/.well-known/lnurlp/${user}`;
      }
      if (input.toLowerCase().startsWith('lnurl1')) {
        const url = decodeLnurlStr(input);
        if (!url) throw new Error('Failed to decode LNURL bech32 string.');
        return url;
      }
      if (input.toLowerCase().startsWith('https://') || input.toLowerCase().startsWith('http://')) {
        return input;
      }
      throw new Error('Unrecognised format. Use a Lightning Address, LNURL, or HTTPS URL.');
    }

    async function resolveLnurl(input) {
      const url = await resolveToUrl(input);
      const res = await fetch(url);
      if (!res.ok) throw new Error(`LNURL fetch failed: ${res.status}`);
      const data = await res.json();
      if (data.status === 'ERROR') throw new Error(data.reason || 'LNURL error');
      if (data.tag !== 'payRequest') throw new Error('Not a payRequest LNURL endpoint.');
      return data;
    }

    async function fetchInvoice(callback, amountMsats) {
      const url = `${callback}${callback.includes('?') ? '&' : '?'}amount=${amountMsats}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`Invoice fetch failed: ${res.status}`);
      const data = await res.json();
      if (data.status === 'ERROR') throw new Error(data.reason || 'Invoice error');
      if (!data.pr) throw new Error('No invoice (pr) in response.');
      return data.pr;
    }

    // ── UI helpers ─────────────────────────────────────────────────────────────
    function now() {
      return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function logEvent(event, msg) {
      const el = document.getElementById('eventLog');
      const empty = document.getElementById('logEmpty');
      if (empty) empty.remove();
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.innerHTML = `<span class="log-time">${now()}</span><span class="log-event">${event}</span><span class="log-msg">${msg}</span>`;
      el.prepend(entry);
    }

    function setFormError(msg) {
      document.getElementById('formError').textContent = msg;
    }

    function makeDemoPaidFetch(invoice, amountSats, endpoint) {
      const paidResponse = {
        ok: true,
        endpoint,
        invoicePreview: `${invoice.slice(0, 24)}…`,
      };

      return async (input, init) => {
        const requestUrl = input instanceof Request ? input.url : String(input);
        if (requestUrl !== endpoint) return fetch(input, init);

        const headers = new Headers(
          init?.headers ?? (input instanceof Request ? input.headers : undefined),
        );
        const authorization = headers.get('Authorization');
        if (!authorization) {
          const challenge = {
            id: crypto.randomUUID(),
            realm: window.location.host || 'localhost',
            method: 'lightning',
            intent: 'charge',
            request: {
              amount: String(amountSats),
              currency: 'BTC',
              description: 'TIPT demo invoice payment',
              methodDetails: { invoice, network: 'mainnet' },
            },
          };

          // mppx expects `request` to be a base64url-encoded JSON payload.
          const requestJson = JSON.stringify(challenge.request);
          const request = btoa(unescape(encodeURIComponent(requestJson)))
            .replace(/\+/g, '-')
            .replace(/\//g, '_')
            .replace(/=+$/, '');

          return new Response(JSON.stringify({ error: 'payment required' }), {
            status: 402,
            headers: {
              'Content-Type': 'application/json',
              'WWW-Authenticate':
                `Payment id="${challenge.id}", realm="${challenge.realm}", method="${challenge.method}", intent="${challenge.intent}", request="${request}"`,
            },
          });
        }

        return new Response(JSON.stringify({ ...paidResponse, authorization }), {
          status: 200,
          headers: { 'Content-Type': 'application/json' },
        });
      };
    }

    async function runSdkDemoPayment(invoice, amountSats) {
      const endpoint = 'https://demo.tipt.local/paid-resource';
      const tipt = createTiptLightningClient({
        polyfill: false,
        fetch: makeDemoPaidFetch(invoice, amountSats, endpoint),
      });
      return tipt.fetch(endpoint, { method: 'GET' });
    }

    // ── Wallet status ─────────────────────────────────────────────────────────
    let walletReady = false;
    window.addEventListener('mpp:extension', (e) => {
      const detail = e.detail || {};
      if (detail.type !== 'response') return;
      walletReady = true;
      document.getElementById('statusDot').className = 'status-dot detected';
      document.getElementById('statusText').textContent = `${detail.name || 'Wallet'} detected (v${detail.version || '?'})`;
      const methods = (detail.paymentMethods || []).join(', ');
      const intents = (detail.intents || []).join(', ');
      document.getElementById('statusCaps').textContent = `intents=[${intents}] methods=[${methods}]`;
      const walletEl = document.getElementById('statusWallet');
      if (detail.walletConfigured === true) {
        walletEl.className = 'status-wallet configured';
        walletEl.textContent = 'Wallet configured';
      } else if (detail.walletConfigured === false) {
        walletEl.className = 'status-wallet unconfigured';
        walletEl.textContent = 'No wallet configured — open the TIPT extension to create or restore one';
      } else {
        walletEl.className = 'status-wallet';
        walletEl.textContent = 'Wallet status unknown';
      }
      refreshPayButton();
      logEvent(
        'mpp:extension',
        `type=response, name=${detail.name}, intents=[${(detail.intents||[]).join(', ')}], methods=[${(detail.paymentMethods||[]).join(', ')}], walletConfigured=${detail.walletConfigured}`,
      );
    });

    // Surface extension bridge traffic in the event log so the SDK flow is visible.
    window.addEventListener('mpp:challenge', (e) => {
      const d = e.detail || {};
      logEvent(
        'mpp:challenge',
        `requestId=${String(d.requestId || '?').slice(0, 8)}…, invoice=${String(d.invoice || '').slice(0, 16)}…`,
      );
    });
    window.addEventListener('mpp:credential', (e) => {
      const d = e.detail || {};
      logEvent('mpp:credential', `approved=${Boolean(d.approved)}, error=${d.error || 'none'}`);
    });

    // Request announcement on load
    logEvent('mpp:extension', 'dispatched discovery request on page load');
    window.dispatchEvent(new CustomEvent('mpp:extension', {
      detail: { type: 'request', paymentMethods: ['lightning'], intents: ['charge'] },
    }));

    // ── Live recipient classification + form gating ───────────────────────────
    const recipientInput = document.getElementById('recipient');
    const amountInput = document.getElementById('amount');
    const formGrid = document.querySelector('.form-grid');
    const kindHint = document.getElementById('kindHint');
    const payBtn = document.getElementById('payBtn');

    function refreshPayButton() {
      const cls = classifyRecipient(recipientInput.value);
      // BOLT11 has an embedded amount, so the amount field is suppressed
      // and the button is enabled as soon as the recipient parses. Every
      // other kind requires a positive amount.
      const amtOk = cls.kind === 'bolt11'
        || (Number.isFinite(parseInt(amountInput.value, 10)) && parseInt(amountInput.value, 10) > 0);
      const kindOk = cls.kind === 'bolt11' || cls.kind === 'spark' || cls.kind === 'lnurl' || cls.kind === 'address';
      payBtn.disabled = !(walletReady && kindOk && amtOk);
    }

    function refreshKindHint() {
      const cls = classifyRecipient(recipientInput.value);
      kindHint.className = `kind-hint ${cls.kind}`;
      kindHint.innerHTML = `Detected: <span class="kind-name">${KIND_LABEL[cls.kind]}</span>`;
      formGrid.classList.toggle('no-amount', cls.kind === 'bolt11');
      refreshPayButton();
    }

    recipientInput.addEventListener('input', refreshKindHint);
    amountInput.addEventListener('input', refreshPayButton);
    refreshKindHint();

    // ── Pay button ─────────────────────────────────────────────────────────────
    payBtn.addEventListener('click', async () => {
      setFormError('');
      const rawRecipient = recipientInput.value.trim();
      const amountSatsRaw = parseInt(amountInput.value, 10);
      const cls = classifyRecipient(rawRecipient);

      if (cls.kind === 'empty' || cls.kind === 'invalid') {
        setFormError('Enter a Lightning Address, LNURL, BOLT11 invoice, or Spark address.');
        return;
      }
      const needsAmount = cls.kind !== 'bolt11';
      if (needsAmount && (!Number.isFinite(amountSatsRaw) || amountSatsRaw <= 0)) {
        setFormError('Enter a valid amount in sats.');
        return;
      }

      payBtn.disabled = true;
      payBtn.textContent = 'Preparing…';

      // Hide previous response
      document.getElementById('responseEmpty').style.display = 'none';
      document.getElementById('responseBox').style.display = 'none';

      // Build a Lightning invoice target. LNURL/Lightning Address are resolved
      // up-front; then the SDK drives the Payment challenge flow automatically.
      let target;
      let amountSatsForRequest;

      try {
        if (cls.kind === 'bolt11') {
          target = rawRecipient;
          amountSatsForRequest = 1;
        } else if (cls.kind === 'spark') {
          throw new Error('Spark addresses are not supported in the Lightning SDK demo. Use BOLT11, LNURL, or Lightning Address.');
        } else {
          // Lightning Address or LNURL — resolve and fetch invoice.
          logEvent('lnurl', `resolving ${rawRecipient}`);
          payBtn.textContent = 'Resolving…';
          const payInfo = await resolveLnurl(rawRecipient);
          const minSats = Math.ceil(payInfo.minSendable / 1000);
          const maxSats = Math.floor(payInfo.maxSendable / 1000);
          if (amountSatsRaw < minSats) throw new Error(`Minimum is ${minSats} sats.`);
          if (amountSatsRaw > maxSats) throw new Error(`Maximum is ${maxSats} sats.`);
          logEvent('lnurl', `fetching invoice for ${amountSatsRaw} sats`);
          target = await fetchInvoice(payInfo.callback, amountSatsRaw * 1000);
          amountSatsForRequest = amountSatsRaw;
          logEvent('lnurl', `invoice: ${target.slice(0, 24)}…`);
        }
      } catch (err) {
        setFormError(err.message);
        payBtn.disabled = false;
        payBtn.textContent = 'Pay via TIPT SDK';
        refreshPayButton();
        return;
      }

      payBtn.textContent = 'Paying via SDK…';

      const badge = document.getElementById('responseBadge');
      try {
        const response = await runSdkDemoPayment(target, amountSatsForRequest ?? 1);
        const body = await response.json();
        badge.className = 'badge badge-success';
        badge.textContent = 'APPROVED';
        document.getElementById('responseJson').textContent = JSON.stringify(
          {
            approved: true,
            status: response.status,
            body,
          },
          null,
          2,
        );
      } catch (err) {
        badge.className = 'badge badge-error';
        badge.textContent = 'REJECTED';
        document.getElementById('responseJson').textContent = JSON.stringify(
          {
            approved: false,
            error: err?.message || String(err),
          },
          null,
          2,
        );
      }
      document.getElementById('responseBox').style.display = 'block';
      payBtn.textContent = 'Pay via TIPT SDK';
      refreshPayButton();
    });
  </script>
</body>
</html>
