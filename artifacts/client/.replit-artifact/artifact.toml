kind = "web"
previewPath = "/"
title = "Client"
version = "1.0.0"
id = "artifacts/client"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19310

[services.development]
run = "pnpm --filter @workspace/client run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/client", "run", "build" ]
publicDir = "artifacts/client/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19310"
BASE_PATH = "/"
